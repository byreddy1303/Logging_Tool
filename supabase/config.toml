project_id = "air-journal"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"

[functions.llm-router]
verify_jwt = true

[functions.schedule-reattempts]
verify_jwt = false

[functions.compute-readiness]
verify_jwt = false

[functions.daily-digest]
verify_jwt = true

[functions.telegram-webhook]
verify_jwt = false
